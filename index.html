<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خزنتي - Khaznati</title>
    <style>
        :root {
            --primary-color: #3f51b5;
            --secondary-color: #ff9800;
            --bg-light: #f5f5f5;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* --- شاشة البداية (Splash) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--primary-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        /* --- الهيدر والقائمة الجانبية --- */
        header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            position: relative;
        }

        #menu-btn {
            position: absolute;
            right: 15px;
            top: 15px;
            cursor: pointer;
            font-size: 1.8rem;
        }

        #side-drawer {
            position: fixed;
            top: 0; right: -250px; width: 250px; height: 100%;
            background: white;
            box-shadow: -2px 0 5px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 900;
            padding-top: 60px;
        }

        .drawer-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        /* --- المحتوى الرئيسي (الشبكة) --- */
        #main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .item-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .item-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            background: #e0e0e0;
        }

        /* --- شريط التنقل السفلي --- */
        nav {
            height: 70px;
            background: white;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #ddd;
            position: relative;
        }

        .nav-btn {
            font-size: 1.5rem;
            color: #757575;
            cursor: pointer;
        }

        .nav-btn.active { color: var(--primary-color); }

        .add-btn-container {
            position: absolute;
            top: -30px;
            background: var(--primary-color);
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        /* --- شاشة المنبه --- */
        #alarm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 35, 126, 0.95);
            color: white;
            z-index: 1100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .btn-confirm {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
